name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Flutter (latest stable)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3️⃣ Create fresh Flutter project (proper Gradle structure)
      - name: Create Flutter Project
        run: flutter create --project-name musify_clone temp_app

      # 4️⃣ Replace lib & pubspec with your repo code
      - name: Inject App Source
        run: |
          rm -rf temp_app/lib
          cp -r lib temp_app/lib
          cp pubspec.yaml temp_app/pubspec.yaml

      # 5️⃣ Get dependencies
      - name: Install Dependencies
        run: |
          cd temp_app
          flutter pub get

      # 6️⃣ Build Release APK
      - name: Build APK
        run: |
          cd temp_app
          flutter build apk --release

      # 7️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: musify_clone_apk
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
